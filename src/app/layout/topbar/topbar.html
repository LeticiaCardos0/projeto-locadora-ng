<header class="bg-navy px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <img src="logo/logo.png" alt="Modular Locadora" class="h-9 w-auto" />
  </div>

  <div class="flex items-center gap-4">
    <div class="hidden sm:flex items-center gap-2 bg-navy-light rounded-lg px-3 py-2 w-56">
      <i class="ti ti-search text-muted text-sm"></i>
      <input
        type="text"
        placeholder="Faça sua busca"
        class="bg-transparent text-sm text-cream placeholder-muted outline-none w-full"
      />
    </div>

    <button
      type="button"
      class="bg-coral text-coral-soft text-sm font-medium px-4 py-2 rounded-lg hover:bg-coral/90 transition"
    >
      Entrar
    </button>

    <button
      type="button"
      aria-label="Conta"
      class="w-9 h-9 rounded-full bg-navy-light flex items-center justify-center"
    >
      <i class="ti ti-user text-muted text-sm"></i>
    </button>
  </div>
</header>
