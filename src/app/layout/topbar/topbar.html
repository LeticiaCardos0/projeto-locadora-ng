<header class="bg-white dark:bg-black border-b border-black/10 dark:border-white/10 px-6 py-3 flex items-center justify-between transition-colors">
  <div class="flex items-center gap-3">
    <a href="/"><img src="logo/logo.png" alt="Modular Locadora" class="cursor-pointer h-9 w-auto" /></a>
  </div>

  <div class="flex items-center gap-4">
    <div class="hidden sm:flex items-center gap-2 border border-black/15 dark:border-white/15 rounded-lg px-3 py-2 w-56">
      <i class="ti ti-search text-black/50 dark:text-white/50 text-sm"></i>
      <input
        type="text"
        placeholder="Faça sua busca"
        class="cursor-pointer bg-transparent text-sm text-black dark:text-white placeholder-black/40 dark:placeholder-white/40 outline-none w-full"
      />
    </div>

    <!-- BOTÃO DE TEMA CLARO/ESCURO -->
    <button
      type="button"
      (click)="toggleTema()"
      aria-label="Alternar tema"
      class="cursor-pointer w-9 h-9 rounded-full border border-black/15 dark:border-white/15 flex items-center justify-center text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition"
    >
      @if (tema.tema() === 'light') {
        <i class="ti ti-moon text-sm"></i>
      } @else {
        <i class="ti ti-sun text-sm"></i>
      }
    </button>

    <button
      type="button"
      class="cursor-pointer bg-black text-white dark:bg-white dark:text-black text-sm font-medium px-4 py-2 rounded-lg hover:opacity-85 transition"
    >
      Entrar
    </button>

    <button
      type="button"
      aria-label="Conta"
      class="cursor-pointer w-9 h-9 rounded-full border border-black/15 dark:border-white/15 flex items-center justify-center text-black dark:text-white"
    >
      <i class="ti ti-user text-sm"></i>
    </button>
  </div>
</header>
